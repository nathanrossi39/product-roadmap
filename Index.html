<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Collaborative Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        
        /* Modern, slim scrollbars for the columns */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Sidebar transition */
        #inboxSidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen relative">
    
    <!-- Header Navigation -->
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between sticky top-0 z-10">
        <h1 class="text-xl font-bold text-slate-800">Product Roadmap</h1>
        <div class="flex gap-3">
            <button onclick="toggleInbox()" class="flex items-center gap-2 px-4 py-2 bg-amber-50 text-amber-700 hover:bg-amber-100 rounded-lg transition font-medium border border-amber-200 shadow-sm">
                <span class="material-icons text-sm">inbox</span> 
                Requests Inbox 
                <span id="inboxCount" class="bg-amber-500 text-white text-xs px-2 py-0.5 rounded-full ml-1">0</span>
            </button>
            <button onclick="fetchSheetData()" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg transition shadow-sm border border-slate-200 bg-white">
                <span class="material-icons text-sm">refresh</span> Refresh
            </button>
            <button onclick="openModal()" class="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-indigo-700 transition shadow-sm border border-indigo-700">
                <span class="material-icons text-sm">add</span> New Feature
            </button>
        </div>
    </header>

    <!-- Main Kanban Board -->
    <main class="p-8 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <!-- Now Column -->
        <div class="flex flex-col gap-4">
            <h2 class="font-semibold text-slate-500 uppercase text-xs tracking-wider flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-500"></span>Now</h2>
            <div id="col-Now" class="bg-slate-100/50 p-3 rounded-2xl h-[600px] overflow-y-auto border border-slate-200/60 transition-colors duration-200" ondrop="drop(event, 'Now')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
        </div>
        
        <!-- Next Column -->
        <div class="flex flex-col gap-4">
            <h2 class="font-semibold text-slate-500 uppercase text-xs tracking-wider flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-amber-500"></span>Next</h2>
            <div id="col-Next" class="bg-slate-100/50 p-3 rounded-2xl h-[600px] overflow-y-auto border border-slate-200/60 transition-colors duration-200" ondrop="drop(event, 'Next')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
        </div>
        
        <!-- Later Column -->
        <div class="flex flex-col gap-4">
            <h2 class="font-semibold text-slate-500 uppercase text-xs tracking-wider flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-purple-500"></span>Later</h2>
            <div id="col-Later" class="bg-slate-100/50 p-3 rounded-2xl h-[600px] overflow-y-auto border border-slate-200/60 transition-colors duration-200" ondrop="drop(event, 'Later')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
        </div>
        
        <!-- Completed Column -->
        <div class="flex flex-col gap-4">
            <h2 class="font-semibold text-slate-500 uppercase text-xs tracking-wider flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-500"></span>Completed</h2>
            <div id="col-Completed" class="bg-slate-100/50 p-3 rounded-2xl h-[600px] overflow-y-auto border border-slate-200/60 transition-colors duration-200" ondrop="drop(event, 'Completed')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
        </div>

    </main>

    <!-- Sidebar: Customer Requests Inbox -->
    <aside id="inboxSidebar" class="sidebar-closed fixed top-0 right-0 h-full w-[400px] bg-white shadow-2xl border-l border-slate-200 z-40 flex flex-col">
        <div class="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">
            <div class="flex items-center gap-2">
                <span class="material-icons text-amber-600">forum</span>
                <h2 class="font-bold text-slate-800">Customer Requests</h2>
            </div>
            <button onclick="toggleInbox()" class="text-slate-400 hover:text-slate-700 bg-white border border-slate-200 rounded-md p-1 flex items-center justify-center transition">
                <span class="material-icons text-sm">close</span>
            </button>
        </div>
        <div class="p-4 bg-amber-50 border-b border-amber-100 text-xs text-amber-800 leading-relaxed shadow-inner">
            Drag these incoming customer requests directly onto your Kanban board to automatically convert them into planned features.
        </div>
        <div id="inboxList" class="p-4 flex-1 overflow-y-auto space-y-3 bg-slate-50">
            <div class="text-center text-slate-400 text-sm mt-10">Loading requests...</div>
        </div>
    </aside>

    <!-- Modern Feature Modal (Add/Edit) -->
    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md card-shadow">
            <h2 class="text-xl font-bold mb-6 text-slate-800" id="modalTitle">Add Feature</h2>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <input type="text" id="title" placeholder="Feature Title" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                <textarea id="benefit" placeholder="What is the benefit?" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 h-28 resize-none"></textarea>
                
                <div class="flex gap-3">
                    <div class="flex-1">
                        <input type="text" id="category" list="categoryList" placeholder="Category (e.g., Analytics)" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500">
                        <datalist id="categoryList">
                            <!-- Populated dynamically -->
                        </datalist>
                    </div>
                    <div class="flex-1">
                        <input type="text" id="version" placeholder="Version (e.g., v1.2)" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button id="deleteBtn" onclick="deleteRecord()" class="hidden px-4 py-3 bg-rose-50 text-rose-600 border border-rose-200 font-medium hover:bg-rose-100 rounded-xl transition flex items-center justify-center" title="Delete Feature">
                    <span class="material-icons">delete</span>
                </button>
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="flex-1 px-4 py-3 text-slate-600 border border-slate-200 font-medium hover:bg-slate-50 rounded-xl transition">Cancel</button>
                <button onclick="saveRecord()" class="flex-1 bg-indigo-600 text-white font-medium py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Popup -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50">
        <span class="material-icons text-emerald-400">info</span>
        <span id="toastMessage" class="font-medium text-sm"></span>
    </div>

    <script>
        // MAIN DATABASE URL - Ensure this points to the newly deployed Apps Script with the getInbox Proxy
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxBpsFmNGqvUgydQ6Z4yyqKszXItj_s9lJlvA-In9hDHRQyRvAThSxopFQdUshi_UJf/exec"; 
        
        let roadmapItems = [];
        let customerRequests = [];

        // Global function to show a notification popup
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 3000);
        }

        // Toggle Sidebar state
        function toggleInbox() {
            const sidebar = document.getElementById('inboxSidebar');
            if (sidebar.classList.contains('sidebar-closed')) {
                sidebar.classList.remove('sidebar-closed');
                sidebar.classList.add('sidebar-open');
                fetchCustomerRequests();
            } else {
                sidebar.classList.add('sidebar-closed');
                sidebar.classList.remove('sidebar-open');
            }
        }

        // Fetch Main Kanban Data
        async function fetchSheetData() {
            try {
                const res = await fetch(WEB_APP_URL);
                roadmapItems = await res.json();
                render();
                fetchCustomerRequests(); // Fetch inbox in background so it's ready
            } catch (e) {
                console.error("Error fetching board data:", e);
                showToast("Failed to fetch Kanban data. Check network.");
            }
        }

        // Fetch Customer Requests (using Proxy)
        async function fetchCustomerRequests() {
            try {
                // Fetching JSON securely through our Apps Script Proxy
                const res = await fetch(WEB_APP_URL + "?action=getInbox", { cache: 'no-store' });
                const result = await res.json();
                
                if (result.status === "error") {
                    console.error("Apps Script Error:", result.message);
                    throw new Error(result.message);
                }

                const rows = result.data;
                
                // Skip header row and map indices based on the provided spreadsheet structure
                customerRequests = rows.slice(1).filter(r => r.length > 2 && r[2].toString().trim() !== '').map((r, i) => {
                    return {
                        reqId: 'req_' + i, 
                        category: r[1] ? r[1].toString().trim() : 'Customer Request', // Column B
                        title: r[2] ? r[2].toString().trim() : 'Untitled', // Column C
                        benefit: r[3] ? r[3].toString().trim() : '', // Column D
                        urgency: r[7] ? r[7].toString().trim() : 'Normal' // Column H
                    };
                }).reverse(); // Show newest requests first

                renderInbox();
            } catch (err) {
                console.error("Error fetching requests:", err);
                document.getElementById('inboxList').innerHTML = `<div class="text-center text-rose-500 text-sm mt-10">Failed to load requests.<br><br>Check console (F12) for details. Ensure you have authorized the script to read the second sheet.</div>`;
            }
        }

        // Render the Inbox Sidebar list
        function renderInbox() {
            const inboxList = document.getElementById('inboxList');
            inboxList.innerHTML = '';
            
            if (customerRequests.length === 0) {
                inboxList.innerHTML = `<div class="text-center text-slate-500 text-sm mt-10">No new customer requests found!</div>`;
                document.getElementById('inboxCount').innerText = "0";
                return;
            }

            let unaddedCount = 0;

            customerRequests.forEach((req, index) => {
                const isHigh = req.urgency.toLowerCase() === 'high';
                
                // Check if this exact request is already on the Kanban board
                const isAlreadyOnBoard = roadmapItems.some(item => item.title === req.title && item.benefit === req.benefit);
                
                if (!isAlreadyOnBoard) unaddedCount++;
                
                const card = document.createElement('div');
                
                if (isAlreadyOnBoard) {
                    // Added to Board Styling
                    card.className = `bg-slate-50 p-4 rounded-xl border border-slate-200 opacity-60 relative`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border bg-slate-100 text-slate-400 truncate max-w-[150px]">${req.category}</span>
                            <span class="text-[10px] font-bold text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded-full flex items-center gap-1"><span class="material-icons text-[10px]">check</span> On Board</span>
                        </div>
                        <h3 class="font-semibold text-slate-500 text-sm mb-1 leading-tight line-through">${req.title}</h3>
                        <p class="text-xs text-slate-400 leading-relaxed line-clamp-3">${req.benefit}</p>
                    `;
                } else {
                    // Normal Draggable Styling
                    card.className = `bg-white p-4 rounded-xl border ${isHigh ? 'border-amber-300 shadow-sm' : 'border-slate-200'} cursor-grab active:cursor-grabbing hover:border-indigo-300 transition-all group relative`;
                    card.draggable = true;
                    
                    // Special drag prefix 'INBOX_' so we know it's coming from the inbox panel
                    card.ondragstart = (e) => e.dataTransfer.setData('text', 'INBOX_' + index);
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border bg-slate-50 text-slate-600 truncate max-w-[200px]">${req.category}</span>
                            ${isHigh ? '<span class="material-icons text-amber-500 text-sm" title="High Urgency">warning</span>' : ''}
                        </div>
                        <h3 class="font-semibold text-slate-800 text-sm mb-1 leading-tight">${req.title}</h3>
                        <p class="text-xs text-slate-500 leading-relaxed line-clamp-3">${req.benefit}</p>
                    `;
                }
                
                inboxList.appendChild(card);
            });
            
            // Update the badge with the number of un-added requests
            document.getElementById('inboxCount').innerText = unaddedCount.toString();
        }

        // Assign a color theme based on the Category string
        function getCategoryTheme(category) {
            if (!category) return 'bg-slate-50 text-slate-700 border-slate-200';
            
            // Hardcoded defaults
            const predefined = {
                'Analytics': 'bg-blue-50 text-blue-700 border-blue-200',
                'Usability': 'bg-emerald-50 text-emerald-700 border-emerald-200',
                'Infrastructure': 'bg-purple-50 text-purple-700 border-purple-200'
            };
            if (predefined[category]) return predefined[category];

            // Generate deterministic random colors for user-created categories
            const palettes = [
                'bg-pink-50 text-pink-700 border-pink-200',
                'bg-teal-50 text-teal-700 border-teal-200',
                'bg-orange-50 text-orange-700 border-orange-200',
                'bg-cyan-50 text-cyan-700 border-cyan-200',
                'bg-rose-50 text-rose-700 border-rose-200',
                'bg-indigo-50 text-indigo-700 border-indigo-200'
            ];
            let hash = 0;
            for (let i = 0; i < category.length; i++) hash = category.charCodeAt(i) + ((hash << 5) - hash);
            return palettes[Math.abs(hash) % palettes.length];
        }

        // Render the Main Kanban Board
        function render() {
            // Setup unique categories for the Datalist
            const uniqueCategories = new Set(['Analytics', 'Usability', 'Infrastructure']);
            roadmapItems.forEach(item => { if (item.category) uniqueCategories.add(item.category); });
            
            const datalist = document.getElementById('categoryList');
            datalist.innerHTML = '';
            uniqueCategories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                datalist.appendChild(option);
            });

            // Loop through each column state and populate
            ['Now', 'Next', 'Later', 'Completed'].forEach(tf => {
                const col = document.getElementById('col-' + tf);
                col.innerHTML = '';
                
                roadmapItems.filter(i => i.timeframe === tf).forEach(item => {
                    const theme = getCategoryTheme(item.category);
                    const isCompleted = tf === 'Completed';
                    const card = document.createElement('div');
                    
                    // Completed cards get greyed out slightly
                    card.className = `bg-white p-5 rounded-xl border border-slate-100 card-shadow cursor-grab active:cursor-grabbing hover:border-indigo-300 hover:shadow-md transition-all mb-3 group ${isCompleted ? 'opacity-60 bg-slate-50' : ''}`;
                    card.draggable = true;
                    card.id = item.id;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-bold uppercase tracking-wider px-2.5 py-0.5 rounded-full border ${theme} truncate max-w-[200px]">${item.category || 'Feature'}</span>
                            <span class="material-icons text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity text-sm">drag_indicator</span>
                        </div>
                        <h3 class="font-semibold ${isCompleted ? 'text-slate-500 line-through' : 'text-slate-800'} mb-1 leading-tight">${item.title}</h3>
                        <p class="text-sm text-slate-500 leading-relaxed line-clamp-3">${item.benefit}</p>
                        ${item.version ? `<div class="mt-3 pt-3 border-t border-slate-100 text-xs font-medium text-slate-400 flex items-center gap-1"><span class="material-icons text-[14px]">local_offer</span> Applied in: ${item.version}</div>` : ''}
                    `;
                    card.ondragstart = (e) => e.dataTransfer.setData('text', item.id);
                    card.ondblclick = () => openModal(item.id);
                    col.appendChild(card);
                });
            });
        }

        // Highlight column on Drag Over
        function allowDrop(e) { 
            e.preventDefault(); 
            e.currentTarget.classList.add('bg-indigo-50/50', 'border-indigo-300');
        }

        // Remove Highlight
        function dragLeave(e) {
            e.currentTarget.classList.remove('bg-indigo-50/50', 'border-indigo-300');
        }

        // Handle Card Drop (From Board OR From Inbox)
        async function drop(e, tf) {
            e.currentTarget.classList.remove('bg-indigo-50/50', 'border-indigo-300');
            const dataId = e.dataTransfer.getData('text');
            
            // Scenario 1: Dragged from the Inbox Sidebar
            if (dataId.startsWith('INBOX_')) {
                const index = parseInt(dataId.split('_')[1]);
                const req = customerRequests[index];
                
                // Convert to new Roadmap Item
                const newItem = {
                    id: Date.now().toString(), // Generate new DB ID based on timestamp
                    title: req.title,
                    benefit: req.benefit,
                    category: req.category,
                    timeframe: tf,
                    version: ''
                };
                
                roadmapItems.push(newItem);
                showToast(`Converted "${newItem.title}" to ${tf}`);
                render();
                renderInbox(); // Update the Inbox to show it as "On Board"
                await pushToSheet(); // Sync new item to Google Sheets
                return;
            }

            // Scenario 2: Normal Drag inside the board
            const item = roadmapItems.find(i => i.id == dataId);
            if (item && item.timeframe !== tf) {
                item.timeframe = tf;
                showToast(`Moved "${item.title}" to ${tf}`);
                render();
                await pushToSheet(); // Sync movement to Google Sheets
            }
        }

        // Save Modal Form
        async function saveRecord() {
            const id = document.getElementById('editId').value || Date.now().toString();
            const item = { 
                id, 
                title: document.getElementById('title').value.trim(), 
                benefit: document.getElementById('benefit').value.trim(), 
                timeframe: document.getElementById('editId').value ? roadmapItems.find(i => i.id == id).timeframe : 'Now',
                category: document.getElementById('category').value.trim() || 'General',
                version: document.getElementById('version').value.trim()
            };
            
            if(!item.title) {
                alert("Please enter a title.");
                return;
            }

            const idx = roadmapItems.findIndex(i => i.id == id);
            if(idx > -1) roadmapItems[idx] = item; // Update existing
            else roadmapItems.push(item); // Add new
            
            document.getElementById('modal').classList.add('hidden');
            render();
            renderInbox(); // Update inbox just in case titles changed
            showToast(`Saved "${item.title}"`);
            await pushToSheet();
        }

        // Delete item from Modal
        async function deleteRecord() {
            const id = document.getElementById('editId').value;
            if (!id) return;

            if (confirm("Are you sure you want to delete this feature permanently?")) {
                const idx = roadmapItems.findIndex(i => i.id == id);
                if (idx > -1) {
                    const deletedTitle = roadmapItems[idx].title;
                    roadmapItems.splice(idx, 1);
                    
                    document.getElementById('modal').classList.add('hidden');
                    render();
                    renderInbox(); // Make available in inbox again
                    showToast(`Deleted "${deletedTitle}"`);
                    await pushToSheet();
                }
            }
        }

        // Master Sync to Google Sheet Backend
        async function pushToSheet() {
            try {
                await fetch(WEB_APP_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'saveAll', items: roadmapItems }) 
                });
            } catch (err) {
                console.error("Failed to sync:", err);
                showToast("Error saving to cloud. Data may be lost on refresh.");
            }
        }

        // Open Modal and populate fields (or clear for new)
        function openModal(id = null) {
            const modal = document.getElementById('modal');
            const deleteBtn = document.getElementById('deleteBtn');
            modal.classList.remove('hidden');
            
            if(id) {
                const item = roadmapItems.find(i => i.id == id);
                document.getElementById('modalTitle').innerText = 'Edit Feature';
                document.getElementById('editId').value = item.id;
                document.getElementById('title').value = item.title;
                document.getElementById('benefit').value = item.benefit;
                document.getElementById('category').value = item.category || '';
                document.getElementById('version').value = item.version || '';
                deleteBtn.classList.remove('hidden');
            } else {
                document.getElementById('modalTitle').innerText = 'Add Feature';
                document.getElementById('editId').value = '';
                document.getElementById('title').value = '';
                document.getElementById('benefit').value = '';
                document.getElementById('category').value = '';
                document.getElementById('version').value = '';
                deleteBtn.classList.add('hidden'); // Hide delete button for new features
            }
        }
        
        // Initial Startup
        fetchSheetData();
    </script>
</body>
</html>
